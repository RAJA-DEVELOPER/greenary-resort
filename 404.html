<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    .page-hero { min-height: 72vh; display: flex; align-items: center; position: relative; overflow: hidden; }
    .page-hero .hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .page-hero::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(10,12,14,0.88), rgba(10,12,14,0.45), rgba(10,12,14,0.82)); }
    .page-hero .container { position: relative; z-index: 1; }
    .page-kicker { font-family: var(--font-ui); font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); font-weight: 800; margin-bottom: 1rem; }
    .page-title { max-width: 820px; font-family: var(--font-display); font-size: clamp(3rem, 8vw, 7rem); line-height: 0.95; color: var(--ivory); }
    .page-title em { color: var(--gold); font-style: italic; }
    .page-subtitle { max-width: 720px; margin-top: 1.5rem; color: var(--ivory); font-size: clamp(1rem, 1.6vw, 1.25rem); }
    .feature-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1.5rem; }
    .feature-card { border: 1px solid var(--glass-border); background: var(--glass-light); padding: 2rem; border-radius: 6px; min-height: 250px; }
    .feature-icon { width: 54px; height: 54px; display: grid; place-items: center; border-radius: 50%; background: rgba(212,168,83,0.1); color: var(--gold); font-size: 1.35rem; margin-bottom: 1.25rem; }
    .feature-title { font-family: var(--font-display); color: var(--ivory); font-size: 1.55rem; margin-bottom: 0.75rem; }
    .feature-text { color: var(--ivory); font-size: 0.95rem; }
    .split-section { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 4rem; align-items: center; }
    .split-section img, .split-section video { width: 100%; height: 520px; object-fit: cover; border-radius: 6px; border: 1px solid var(--glass-border); }
    .quiet-list { display: grid; gap: 0.85rem; margin-top: 1.5rem; }
    .quiet-list li { color: var(--ivory); padding-left: 1.25rem; position: relative; }
    .quiet-list li::before { content: ""; position: absolute; left: 0; top: 0.75rem; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; }
    .gallery-grid img, .gallery-grid video { width: 100%; height: 320px; object-fit: cover; border-radius: 5px; border: 1px solid var(--glass-border); }
    .contact-panel { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 2rem; align-items: stretch; }
    .contact-form { border: 1px solid var(--glass-border); background: var(--glass-light); padding: 2rem; border-radius: 6px; display: grid; gap: 1rem; }
    .contact-form input, .contact-form textarea, .contact-form select { width: 100%; color: var(--ivory); background: var(--glass-light); border: 1px solid var(--glass-border); border-radius: 4px; padding: 0.95rem 1rem; }
    .contact-form textarea { min-height: 150px; resize: vertical; }
    .not-found { min-height: 100vh; display: grid; place-items: center; text-align: center; background: radial-gradient(circle at center, rgba(212,168,83,0.1), transparent 45%), var(--coal); }
    .not-found-code { font-family: var(--font-display); font-size: clamp(7rem, 22vw, 18rem); line-height: 0.8; color: var(--gold); opacity: 0.9; }

    .wide-intro { max-width: 980px; margin: 0 auto; text-align: center; }
    .wide-intro .section-desc { margin-left: auto; margin-right: auto; }
    .mini-kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1rem; margin-top: 2rem; }
    .mini-kpi { border: 1px solid var(--glass-border); background: var(--glass-light); border-radius: 6px; padding: 1.4rem; text-align: center; }
    .mini-kpi strong { display: block; font-family: var(--font-display); font-size: 2rem; color: var(--gold); line-height: 1; }
    .mini-kpi span { display: block; margin-top: 0.55rem; font-family: var(--font-ui); font-size: 0.68rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ivory); }
    .package-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1.25rem; }
    .package-card { border: 1px solid var(--glass-border); background: var(--glass-light); border-radius: 6px; overflow: hidden; }
    .package-card img, .package-card video { width: 100%; height: 260px; object-fit: cover; }
    .package-body { padding: 1.5rem; }
    .package-meta { font-family: var(--font-ui); font-size: 0.68rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.55rem; }
    .package-title { font-family: var(--font-display); font-size: 1.65rem; color: var(--ivory); margin-bottom: 0.65rem; }
    .detail-table { display: grid; border: 1px solid var(--glass-border); border-radius: 6px; overflow: hidden; }
    .detail-row { display: grid; grid-template-columns: 0.8fr 1.2fr; border-bottom: 1px solid rgba(212,168,83,0.1); }
    .detail-row:last-child { border-bottom: none; }
    .detail-row div { padding: 1.1rem 1.25rem; color: var(--ivory); }
    .detail-row div:first-child { font-family: var(--font-ui); font-size: 0.7rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); background: var(--gold-glass); }
    .faq-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
    .faq-item { border: 1px solid var(--glass-border); border-radius: 6px; padding: 1.5rem; background: var(--glass-light); }
    .faq-item h3 { font-family: var(--font-display); color: var(--ivory); font-size: 1.35rem; margin-bottom: 0.6rem; }
    .image-band { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0.75rem; }
    .image-band img { width: 100%; height: 240px; object-fit: cover; border-radius: 5px; border: 1px solid var(--glass-border); }
    .quote-panel { max-width: 980px; margin: 0 auto; text-align: center; border: 1px solid var(--glass-border); border-radius: 6px; padding: clamp(2rem, 5vw, 4rem); background: var(--gold-glass); }
    .quote-panel p { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 3.8rem); line-height: 1.05; color: var(--ivory); }
    .quote-panel span { display: block; margin-top: 1rem; font-family: var(--font-ui); font-size: 0.7rem; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); }
    @media (max-width: 900px) {
      .feature-grid, .split-section, .gallery-grid, .contact-panel { grid-template-columns: 1fr; }

      .mini-kpis, .package-grid, .faq-grid, .image-band { grid-template-columns: 1fr; }
      .detail-row { grid-template-columns: 1fr; }
      .split-section img, .split-section video, .gallery-grid img, .gallery-grid video { height: 320px; }
    }
  </style>
