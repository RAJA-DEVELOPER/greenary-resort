<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - TERRAVANA WILDS</title>
  <meta name="description" content="The page you are looking for could not be found.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="upgrade.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .page-hero { min-height: 72vh; display: flex; align-items: center; position: relative; overflow: hidden; }
    .page-hero .hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .page-hero::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(10,12,14,0.88), rgba(10,12,14,0.45), rgba(10,12,14,0.82)); }
    .page-hero .container { position: relative; z-index: 1; }
    .page-kicker { font-family: var(--font-ui); font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); font-weight: 800; margin-bottom: 1rem; }
    .page-title { max-width: 820px; font-family: var(--font-display); font-size: clamp(3rem, 8vw, 7rem); line-height: 0.95; color: var(--ivory); }
    .page-title em { color: var(--gold); font-style: italic; }
    .page-subtitle { max-width: 720px; margin-top: 1.5rem; color: rgba(237,229,218,0.78); font-size: clamp(1rem, 1.6vw, 1.25rem); }
    .feature-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1.5rem; }
    .feature-card { border: 1px solid rgba(212,168,83,0.18); background: rgba(250,248,245,0.035); padding: 2rem; border-radius: 6px; min-height: 250px; }
    .feature-icon { width: 54px; height: 54px; display: grid; place-items: center; border-radius: 50%; background: rgba(212,168,83,0.1); color: var(--gold); font-size: 1.35rem; margin-bottom: 1.25rem; }
    .feature-title { font-family: var(--font-display); color: var(--ivory); font-size: 1.55rem; margin-bottom: 0.75rem; }
    .feature-text { color: rgba(237,229,218,0.68); font-size: 0.95rem; }
    .split-section { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 4rem; align-items: center; }
    .split-section img, .split-section video { width: 100%; height: 520px; object-fit: cover; border-radius: 6px; border: 1px solid rgba(212,168,83,0.15); }
    .quiet-list { display: grid; gap: 0.85rem; margin-top: 1.5rem; }
    .quiet-list li { color: rgba(237,229,218,0.72); padding-left: 1.25rem; position: relative; }
    .quiet-list li::before { content: ""; position: absolute; left: 0; top: 0.75rem; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; }
    .gallery-grid img, .gallery-grid video { width: 100%; height: 320px; object-fit: cover; border-radius: 5px; border: 1px solid rgba(212,168,83,0.15); }
    .contact-panel { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 2rem; align-items: stretch; }
    .contact-form { border: 1px solid rgba(212,168,83,0.18); background: rgba(250,248,245,0.035); padding: 2rem; border-radius: 6px; display: grid; gap: 1rem; }
    .contact-form input, .contact-form textarea, .contact-form select { width: 100%; color: var(--ivory); background: rgba(250,248,245,0.06); border: 1px solid rgba(212,168,83,0.16); border-radius: 4px; padding: 0.95rem 1rem; }
    .contact-form textarea { min-height: 150px; resize: vertical; }
    .not-found { min-height: 100vh; display: grid; place-items: center; text-align: center; background: radial-gradient(circle at center, rgba(212,168,83,0.1), transparent 45%), var(--coal); }
    .not-found-code { font-family: var(--font-display); font-size: clamp(7rem, 22vw, 18rem); line-height: 0.8; color: var(--gold); opacity: 0.9; }
    @media (max-width: 900px) {
      .feature-grid, .split-section, .gallery-grid, .contact-panel { grid-template-columns: 1fr; }
      .split-section img, .split-section video, .gallery-grid img, .gallery-grid video { height: 320px; }
    }
  </style>
</head>
<body>
  <div id="cursor-dot" aria-hidden="true"></div>
  <div id="cursor-ring" aria-hidden="true"></div>
  <button id="back-to-top" aria-label="Back to top" style="position:fixed;bottom:2rem;right:2rem;z-index:500;width:48px;height:48px;border-radius:50%;background:var(--gold);color:var(--coal);display:flex;align-items:center;justify-content:center;font-size:1.2rem;opacity:0;transition:opacity 0.3s ease;pointer-events:none;box-shadow:0 4px 20px rgba(198,169,114,0.35);"><i class="fa-solid fa-arrow-up"></i></button>


      <main class="not-found">
        <div class="container">
          <div class="not-found-code">404</div>
          <div class="page-kicker">Trail Not Found</div>
          <h1 class="page-title" style="margin-inline:auto;">This path fades into the forest.</h1>
          <p class="page-subtitle" style="margin-inline:auto;">The page you are looking for is not available. Return to the lodge and choose a fresh route.</p>
          <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:2rem;">
            <a href="index.html" class="btn btn-primary">Go Home</a>
            <a href="adventures.html" class="btn btn-ghost">Explore Adventures</a>
          </div>
        </div>
      </main>

  <script src="script.js"></script>
  <script src="upgrade_script.js"></script>
</body>
</html>
